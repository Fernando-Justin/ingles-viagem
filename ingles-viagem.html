<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>English for Travel 🇬🇧</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:  #1A3A5C;
  --teal:  #2A9D8F;
  --gold:  #E9C46A;
  --card-a:#E8F4FD;
  --card-b:#E8F5F2;
  --card-c:#FFF3EB;
  --card-d:#EEF0FF;
  --card-e:#F7E8E8;
  --hdr: 60px;
  --filter: 48px;
  --modebar: 50px;
  --nav: 70px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;   /* NO page scroll */
  font-family: 'Nunito', sans-serif;
  color: var(--navy);
  background: linear-gradient(135deg,#f0f7ff 0%,#e8f5f2 50%,#fff3eb 100%);
}

/* ═══════════════════════════════
   LAYOUT — full-height flex
═══════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh; /* dynamic viewport height for mobile */
}

/* ─── HEADER ─── */
header {
  flex-shrink: 0;
  height: var(--hdr);
  background: var(--navy);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 10px;
  box-shadow: 0 3px 16px rgba(26,58,92,0.28);
  z-index: 50;
}

.logo { display:flex; align-items:center; gap:9px; }
.logo-flag { font-size:1.55rem; line-height:1; }
.logo-text h1 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:900; }
.logo-text p  { font-size:0.62rem; opacity:.65; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

.hdr-chips { display:flex; gap:8px; align-items:center; }
.stat-chip {
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:50px;
  padding:5px 11px;
  font-size:.7rem;
  font-weight:700;
  white-space:nowrap;
}
.stat-chip.teal { background:var(--teal); border-color:var(--teal); }

/* ─── FILTER BAR ─── */
.filter-bar {
  flex-shrink: 0;
  height: var(--filter);
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
  background: white;
  border-bottom: 2px solid #e8eef5;
  z-index: 40;
}
.filter-bar::-webkit-scrollbar { display:none; }

.cat-btn {
  flex-shrink: 0;
  background: #f0f4f8;
  border: 2px solid transparent;
  border-radius: 50px;
  padding: 5px 13px;
  font-family: 'Nunito', sans-serif;
  font-size: .72rem;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  color: var(--navy);
  transition: all .2s;
}
.cat-btn:hover  { background:#e2ecf8; }
.cat-btn.active { background:var(--navy); color:white; }

/* ─── MODE BAR ─── */
.mode-bar {
  flex-shrink: 0;
  height: var(--modebar);
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  background: rgba(255,255,255,.55);
  border-bottom: 1px solid #e8eef5;
}
.mode-btn {
  flex: 1;
  height: 36px;
  border: none;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: .73rem;
  font-weight: 800;
  cursor: pointer;
  background: transparent;
  color: #7a8fa3;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: all .2s;
}
.mode-btn.active {
  background: var(--navy);
  color: white;
  box-shadow: 0 3px 10px rgba(26,58,92,.2);
}

/* ─── SCROLL AREA (only this scrolls) ─── */
#scrollArea {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 14px 14px 0;
}

/* ─── PROGRESS ─── */
.progress-wrap { margin-bottom:12px; }
.progress-hdr  { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.progress-lbl  { font-size:.72rem; font-weight:700; opacity:.6; letter-spacing:.4px; }
.progress-cnt  { font-size:.95rem; font-weight:800; color:var(--teal); }
.progress-bar  { height:6px; background:#e0eaf4; border-radius:50px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--teal),#38c7b5); border-radius:50px; transition:width .4s ease; }

/* ─── LEVEL BADGE ─── */
.level-badge {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 12px;
  border-radius:50px;
  font-size:.68rem;
  font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.level-1 { background:#d4edda; color:#1a6e35; }
.level-2 { background:#cce5ff; color:#0066cc; }
.level-3 { background:#fff3cd; color:#856404; }
.level-4 { background:#f8d7da; color:#842029; }

/* ─── CARD ─── */
.card {
  border-radius: 20px;
  padding: 20px 18px;
  box-shadow: 0 6px 30px rgba(26,58,92,.10);
  position: relative;
  overflow: hidden;
  animation: cardIn .35s cubic-bezier(.34,1.56,.64,1);
  margin-bottom: 10px;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.card::before {
  content:'';
  position:absolute;
  top:-50px; right:-50px;
  width:150px; height:150px;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  pointer-events:none;
}
.card-color-0 { background:var(--card-a); }
.card-color-1 { background:var(--card-b); }
.card-color-2 { background:var(--card-c); }
.card-color-3 { background:var(--card-d); }
.card-color-4 { background:var(--card-e); }

.card-category { font-size:.68rem; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--teal); margin-bottom:12px; }

.english-phrase {
  font-family:'Playfair Display',serif;
  font-size:1.55rem;
  font-weight:700;
  color:var(--navy);
  line-height:1.3;
  margin-bottom:8px;
}

.pronunciation { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.phonetic {
  font-size:.88rem; color:#546a7b; font-style:italic; font-weight:600;
  background:rgba(255,255,255,.6); padding:3px 10px; border-radius:50px;
  border:1px solid rgba(42,157,143,.2);
}
.speak-btn {
  background:var(--teal); border:none; border-radius:50%;
  width:34px; height:34px; cursor:pointer; color:white; font-size:.9rem;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 3px 10px rgba(42,157,143,.35); flex-shrink:0;
}
.speak-btn:hover { transform:scale(1.1); }
.speak-btn:active { transform:scale(.92); }

.divider { height:2px; background:rgba(26,58,92,.08); border-radius:2px; margin:12px 0; }

.portuguese { font-size:1.05rem; color:#4a6278; font-weight:600; line-height:1.5; }

.tip-box {
  margin-top:12px;
  background:rgba(255,255,255,.55);
  border-left:4px solid var(--gold);
  border-radius:0 10px 10px 0;
  padding:9px 13px;
  font-size:.78rem; color:#5a4a1a; font-weight:600;
  display:flex; gap:7px; align-items:flex-start;
}

/* ─── REVEAL ─── */
.reveal-btn {
  background:white;
  border:2px dashed rgba(26,58,92,.22);
  border-radius:12px;
  padding:12px 16px;
  width:100%;
  font-family:'Nunito',sans-serif;
  font-size:.9rem; font-weight:700; color:#7a8fa3;
  cursor:pointer; transition:all .2s; text-align:center;
}
.reveal-btn:hover { border-color:var(--teal); color:var(--teal); }
.hidden-translation { display:none; }
.hidden-translation.show { display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ─── RATING ─── */
.rating-bar { display:flex; gap:7px; margin-top:14px; align-items:center; flex-wrap:wrap; }
.rating-label { font-size:.72rem; font-weight:700; opacity:.6; text-transform:uppercase; letter-spacing:.5px; margin-right:2px; }
.rate-btn {
  border:none; border-radius:50px;
  padding:6px 13px;
  font-family:'Nunito',sans-serif; font-size:.76rem; font-weight:800;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:4px;
}
.rate-btn.hard   { background:#fde8e8; color:#c0392b; }
.rate-btn.medium { background:#fff3cd; color:#7d5700; }
.rate-btn.easy   { background:#d4edda; color:#1a6e35; }
.rate-btn:hover  { transform:translateY(-2px); box-shadow:0 4px 10px rgba(0,0,0,.1); }

/* ─── QUIZ ─── */
.quiz-label { font-size:.78rem; font-weight:700; color:#546a7b; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
.quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.quiz-opt {
  padding:12px 12px;
  background:white; border:2px solid #e0eaf4; border-radius:12px;
  cursor:pointer; font-family:'Nunito',sans-serif; font-size:.82rem; font-weight:700;
  color:var(--navy); transition:all .2s; text-align:left; line-height:1.3;
}
.quiz-opt:hover  { border-color:var(--teal); background:#f0faf9; }
.quiz-opt.correct { border-color:var(--teal); background:#d4edda; color:#1a6e35; }
.quiz-opt.wrong   { border-color:#e74c3c; background:#fde8e8; color:#c0392b; }

/* ─── FRASES BTN (inside card bottom) ─── */
.frases-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  padding: 7px 14px;
  background: rgba(42,157,143,.1);
  border: 1.5px solid rgba(42,157,143,.3);
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: .74rem;
  font-weight: 800;
  color: var(--teal);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
}
.frases-btn:hover { background:rgba(42,157,143,.18); }
.frases-btn .fb-arrow { font-size:.7rem; transition:transform .2s; }

/* ─── NAV BOTTOM ─── */
.nav-fixed {
  flex-shrink: 0;
  height: var(--nav);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 16px;
  padding-bottom: var(--safe-bot);
  background: white;
  border-top: 2px solid #eaf0f8;
  box-shadow: 0 -4px 20px rgba(26,58,92,.07);
  z-index: 50;
}
.nav-btn {
  display:flex; align-items:center; gap:7px;
  padding:11px 22px; border-radius:50px;
  font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:800;
  cursor:pointer; border:none; transition:all .2s;
}
.nav-prev { background:#eaf0f8; color:var(--navy); }
.nav-prev:hover { background:#dce6f0; }
.nav-next { background:var(--navy); color:white; box-shadow:0 4px 16px rgba(26,58,92,.28); }
.nav-next:hover { background:#0f2a45; }
.nav-num { font-weight:800; color:var(--navy); min-width:70px; text-align:center; font-size:.78rem; opacity:.65; }

/* ─── FOOTER ─── */
.site-footer {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 8px 0;
  background: white;
  border-top: 1px solid #f0f4f8;
}
.footer-text {
  font-size: .62rem;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  background: linear-gradient(135deg,#2A9D8F,#457B9D,#6A4C93);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: .7;
}
.footer-dot {
  width:3px; height:3px; border-radius:50%;
  background:linear-gradient(135deg,#2A9D8F,#6A4C93);
  opacity:.4; display:inline-block;
}

/* ─── MODAL — FRASES RELACIONADAS ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,25,45,.55);
  backdrop-filter: blur(3px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display:flex; animation:overlayIn .25s ease; }
@keyframes overlayIn { from{opacity:0} to{opacity:1} }

.modal-sheet {
  background: white;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 80dvh;
  display: flex;
  flex-direction: column;
  animation: sheetUp .3s cubic-bezier(.34,1.2,.64,1);
  overflow: hidden;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle {
  width:40px; height:4px; border-radius:2px;
  background:#d0dce8; margin:12px auto 0; flex-shrink:0;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 10px;
  flex-shrink: 0;
  border-bottom: 1px solid #eaf0f8;
}
.modal-title {
  font-size: .82rem;
  font-weight: 800;
  color: var(--teal);
  letter-spacing: .8px;
  text-transform: uppercase;
}
.modal-close {
  background: #f0f4f8;
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: .9rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--navy);
  transition: background .15s;
}
.modal-close:hover { background: #dce6f0; }

.modal-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 24px;
  flex: 1;
}

.modal-phrase {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 14px;
  margin-bottom: 8px;
  background: #f4f8fc;
  border: 1px solid #e4edf6;
  transition: transform .15s, box-shadow .15s;
}
.modal-phrase:hover { transform:translateX(3px); box-shadow:0 3px 10px rgba(26,58,92,.08); }
.mp-en { font-weight:800; color:var(--navy); font-size:.9rem; margin-bottom:3px; }
.mp-pt { color:#6a82a0; font-size:.78rem; font-weight:600; }
.mp-ph { color:#9aacbe; font-size:.72rem; font-style:italic; }
.mp-speak {
  background:none; border:1.5px solid var(--teal);
  border-radius:50%; width:32px; height:32px;
  color:var(--teal); cursor:pointer; font-size:.85rem;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.mp-speak:hover { background:var(--teal); color:white; }

/* ─── TOAST ─── */
.toast {
  position:fixed; top:80px; left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:var(--navy); color:white;
  padding:10px 22px; border-radius:50px;
  font-size:.8rem; font-weight:700;
  opacity:0; transition:all .3s; z-index:999;
  white-space:nowrap; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ─── KEYBOARD HINT ─── */
.kbd-hint { font-size:.65rem; color:#b0c0d0; text-align:center; font-weight:600; margin-top:8px; margin-bottom:4px; }
kbd { background:#eaf0f8; border:1px solid #c8d8e8; border-radius:4px; padding:1px 5px; font-size:.62rem; font-family:monospace; }

/* ─── RESPONSIVE ─── */
@media (max-width:420px) {
  .english-phrase { font-size:1.3rem; }
  .card { padding:16px 14px; }
  .logo-text p { display:none; }
  .nav-btn { padding:10px 16px; font-size:.78rem; }
  .quiz-options { grid-template-columns:1fr; }
  .modal-phrase { padding:10px 12px; }
  .mp-en { font-size:.84rem; }
}
@media (max-width:350px) {
  .english-phrase { font-size:1.15rem; }
  .mode-btn { font-size:.65rem; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-flag">🇬🇧</div>
      <div class="logo-text">
        <h1>English for Travel</h1>
        <p>Inglês para Viagens — Inglaterra</p>
      </div>
    </div>
    <div class="hdr-chips">
      <div class="stat-chip">📚 1000</div>
      <div class="stat-chip teal" id="masteredChip">⭐ 0</div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('study')"    id="modeStudy">📖 Estudo</button>
    <button class="mode-btn"        onclick="setMode('practice')" id="modePractice">🔄 Prática</button>
    <button class="mode-btn"        onclick="setMode('quiz')"     id="modeQuiz">🧩 Quiz</button>
  </div>

  <!-- SCROLL AREA -->
  <div id="scrollArea">

    <!-- PROGRESS -->
    <div class="progress-wrap">
      <div class="progress-hdr">
        <span class="progress-lbl">Progresso na categoria</span>
        <span class="progress-cnt" id="progressCount">1 / 1000</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:.1%"></div>
      </div>
    </div>

    <!-- CARD -->
    <div id="cardContainer"></div>

    <div class="kbd-hint">Use ← → para navegar · <kbd>Espaço</kbd> revela</div>

  </div><!-- /scrollArea -->

  <!-- NAV -->
  <div class="nav-fixed">
    <button class="nav-btn nav-prev" onclick="navigate(-1)">← Anterior</button>
    <span class="nav-num" id="navNum">1 / 1000</span>
    <button class="nav-btn nav-next" onclick="navigate(1)">Próxima →</button>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-dot"></span>
    <span class="footer-text">By Justin</span>
    <span class="footer-dot"></span>
  </footer>

</div><!-- /app -->

<!-- MODAL — FRASES RELACIONADAS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">🔗 Frases Relacionadas</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

const categories = [
  { id:'all',      label:'🌍 Todas',           color:'#1A3A5C' },
  { id:'basics',   label:'👋 Básico',           color:'#2A9D8F' },
  { id:'airport',  label:'✈️ Aeroporto',        color:'#E76F51' },
  { id:'hotel',    label:'🏨 Hotel',             color:'#457B9D' },
  { id:'transport',label:'🚇 Transporte',        color:'#6A4C93' },
  { id:'food',     label:'🍽️ Restaurante',       color:'#E9C46A' },
  { id:'shopping', label:'🛍️ Compras',           color:'#F4A261' },
  { id:'health',   label:'🏥 Saúde',             color:'#E63946' },
  { id:'sights',   label:'🏛️ Turismo',           color:'#2A9D8F' },
  { id:'social',   label:'💬 Social',            color:'#457B9D' },
  { id:'emergency',label:'🆘 Emergência',        color:'#E63946' },
];

// Combos: frases relacionadas mostradas na mesma frase
const combos = {
  basics: [
    { en:'Good morning!', pt:'Bom dia!', ph:'gúd mórning' },
    { en:'Good afternoon!', pt:'Boa tarde!', ph:'gúd áfternun' },
    { en:'Good evening!', pt:'Boa noite! (chegada)', ph:'gúd ívening' },
    { en:'How are you?', pt:'Como vai você?', ph:'hau ár iú' },
    { en:'Fine, thanks!', pt:'Bem, obrigado!', ph:'fáin thænks' },
    { en:'Nice to meet you.', pt:'Prazer em conhecê-lo.', ph:'náis tu mít iú' },
    { en:'See you later!', pt:'Até mais!', ph:'sí iú léiter' },
  ],
  airport: [
    { en:'Where is the check-in?', pt:'Onde é o check-in?', ph:'uér iz dê chék-in' },
    { en:'My luggage is lost.', pt:'Minha bagagem está perdida.', ph:'mai láguidj iz lost' },
    { en:'I missed my flight.', pt:'Perdi meu voo.', ph:'ai mist mai flait' },
    { en:'Where is gate number...?', pt:'Onde fica o portão...?', ph:'uér iz géit námber' },
    { en:'Here is my passport.', pt:'Aqui está meu passaporte.', ph:'híer iz mai pásport' },
    { en:'Is the flight on time?', pt:'O voo está no horário?', ph:'iz dê fláit on táim' },
    { en:'Where is baggage claim?', pt:'Onde é a esteira de bagagem?', ph:'uér iz báguidj kléim' },

  {cat:'social', level:2, templates:[
    ['Do you like...?', 'Você gosta de...?', 'du iú láik'],
    ['Have you been to...?', 'Você já foi a...?', 'hæv iú bín tu'],
    ['What\'s your favourite...?', 'Qual é o seu(sua)... favorito(a)?', 'uóts iúr féivorit'],
    ['I love...', 'Adoro...', 'ai láv'],
    ['Have you tried...?', 'Você já experimentou...?', 'hæv iú tráid'],
  ]},
  {cat:'health', level:2, templates:[
    ['I need something for...', 'Preciso de algo para...', 'ai níd sámting for'],
    ['Do you have... without a prescription?', 'Tem... sem receita?', 'du iú hæv... uidáut ê priskripchon'],
    ['How many times a day?', 'Quantas vezes ao dia?', 'hau méni táimz ê déi'],
    ['What are the side effects?', 'Quais são os efeitos colaterais?', 'uót ár dê sáid ifékts'],
    ['Is this safe during pregnancy?', 'Isso é seguro durante a gravidez?', 'iz dis séif diúring prégnenci'],
  ]},
  {cat:'emergency', level:2, templates:[
    ['Please contact...', 'Por favor, entre em contato com...', 'plíz kóntækt'],
    ['I need to speak to someone from...', 'Preciso falar com alguém de...', 'ai níd tu spík tu sámwan from'],
    ['This is an emergency.', 'Isso é uma emergência.', 'dis iz ên imórdjenci'],
    ['Please hurry!', 'Por favor, se apresse!', 'plíz hári'],
    ['I need immediate help.', 'Preciso de ajuda imediata.', 'ai níd imídiit hélp'],
  ]},
];

// Gerar as frases extras (401-1000)
let nextId = 401;
while(nextId <= 1000) {
  for(const group of extraTemplates) {
    for(const t of group.templates) {
      if(nextId > 1000) break;
      phrases.push({
        id: nextId,
        cat: group.cat,
        level: group.level,
        en: t[0],
        ph: t[2],
        pt: t[1],
      });
      nextId++;
    }
    if(nextId > 1000) break;
  }
}

// ══════════════════════
//  STATE
// ══════════════════════
let currentIndex = 0;
let currentCat   = 'all';
let currentMode  = 'study';
let masteredSet  = new Set(JSON.parse(localStorage.getItem('mastered') || '[]'));
let filteredPhrases = [];
let showTranslation = false;
let quizAnswered    = false;

function saveMastered() { localStorage.setItem('mastered', JSON.stringify([...masteredSet])); }

function getFiltered() {
  let arr = currentCat === 'all' ? [...phrases] : phrases.filter(p => p.cat === currentCat);
  arr.sort((a,b) => a.level - b.level || a.id - b.id);
  return arr;
}

// ══════════════════════
//  INIT
// ══════════════════════
function init() {
  buildFilterBar();
  filteredPhrases = getFiltered();
  renderCard();
  updateChip();
  document.addEventListener('keydown', onKey);
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.id === currentCat ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => {
      currentCat = c.id;
      currentIndex = 0;
      filteredPhrases = getFiltered();
      showTranslation = false;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCard();
    };
    bar.appendChild(btn);
  });
}

function levelLabel(l) {
  return {1:'🟢 Iniciante',2:'🔵 Básico',3:'🟡 Intermediário',4:'🔴 Avançado'}[l] || '⚪ Geral';
}
function levelClass(l) { return 'level-' + (l || 1); }
function cardColor(idx) { return 'card-color-' + (idx % 5); }
function esc(str) { return str.replace(/'/g,"\\'"); }

// ══════════════════════
//  RENDER
// ══════════════════════
function renderCard() {
  const total = filteredPhrases.length;
  const p     = filteredPhrases[currentIndex];
  const pct   = total ? ((currentIndex + 1) / total * 100).toFixed(1) : 0;

  document.getElementById('progressCount').textContent = `${currentIndex+1} / ${total}`;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('navNum').textContent        = `${currentIndex+1} / ${total}`;

  const hasCombo = (combos[p.cat] || []).length > 0;
  const frasesBtn = hasCombo
    ? `<button class="frases-btn" onclick="openModal()">🔗 Frases <span class="fb-arrow">▼</span></button>`
    : '';

  let modeContent = '';

  if (currentMode === 'study') {
    modeContent = `
      <div class="english-phrase">${p.en}</div>
      <div class="pronunciation">
        <span class="phonetic">/${p.ph}/</span>
        <button class="speak-btn" onclick="speak('${esc(p.en)}')">🔊</button>
      </div>
      <div class="divider"></div>
      <div class="portuguese">${p.pt}</div>
      ${p.tip ? `<div class="tip-box">💡 ${p.tip}</div>` : ''}
      <div class="rating-bar">
        <span class="rating-label">Como foi?</span>
        <button class="rate-btn hard"   onclick="rate('hard',this)">😓 Difícil</button>
        <button class="rate-btn medium" onclick="rate('medium',this)">🤔 Médio</button>
        <button class="rate-btn easy"   onclick="rate('easy',this)">😊 Fácil</button>
      </div>
      ${frasesBtn}
    `;
  } else if (currentMode === 'practice') {
    modeContent = `
      <div class="english-phrase">${p.en}</div>
      <div class="pronunciation">
        <span class="phonetic">/${p.ph}/</span>
        <button class="speak-btn" onclick="speak('${esc(p.en)}')">🔊</button>
      </div>
      <div class="divider"></div>
      <button class="reveal-btn" id="revealBtn" onclick="toggleReveal()">👁️ Mostrar tradução</button>
      <div class="hidden-translation${showTranslation ? ' show' : ''}" id="ptTranslation">
        <div class="portuguese" style="margin-top:12px">${p.pt}</div>
        ${p.tip ? `<div class="tip-box">💡 ${p.tip}</div>` : ''}
      </div>
      <div class="rating-bar" style="margin-top:14px">
        <span class="rating-label">Soube?</span>
        <button class="rate-btn hard" onclick="rate('hard',this)">❌ Não</button>
        <button class="rate-btn easy" onclick="rate('easy',this)">✅ Sim!</button>
      </div>
      ${frasesBtn}
    `;
  } else if (currentMode === 'quiz') {
    const wrongs = phrases.filter(x => x.id !== p.id).sort(()=>Math.random()-.5).slice(0,3);
    const opts   = [...wrongs, p].sort(()=>Math.random()-.5);
    modeContent = `
      <div class="quiz-label">Como se diz em inglês?</div>
      <div class="english-phrase" style="font-size:1.3rem;color:var(--teal)">${p.pt}</div>
      <div class="divider"></div>
      <div class="quiz-options" id="quizOpts">
        ${opts.map(o=>`<button class="quiz-opt" onclick="checkQuiz(this,'${o.id}','${p.id}')">${o.en}</button>`).join('')}
      </div>
      ${frasesBtn}
    `;
  }

  document.getElementById('cardContainer').innerHTML = `
    <div class="level-badge ${levelClass(p.level)}">${levelLabel(p.level)}</div>
    <div class="card ${cardColor(currentIndex)}">
      <div class="card-category">${categories.find(c=>c.id===p.cat)?.label||'🌍 Geral'} · #${p.id}</div>
      ${modeContent}
    </div>
  `;

  const sa = document.getElementById('scrollArea');
  if(sa) sa.scrollTop = 0;
}

// ══════════════════════
//  MODAL
// ══════════════════════
function openModal() {
  const p    = filteredPhrases[currentIndex];
  const list = combos[p.cat] || [];
  if(!list.length) return;

  document.getElementById('modalBody').innerHTML = list.map(c => `
    <div class="modal-phrase">
      <div>
        <div class="mp-en">${c.en}</div>
        <div class="mp-pt">${c.pt}</div>
        <div class="mp-ph">/${c.ph}/</div>
      </div>
      <button class="mp-speak" onclick="speak('${esc(c.en)}')">🔊</button>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ══════════════════════
//  ACTIONS
// ══════════════════════
function navigate(dir) {
  const total = filteredPhrases.length;
  currentIndex    = (currentIndex + dir + total) % total;
  showTranslation = false;
  quizAnswered    = false;
  closeModalDirect();
  renderCard();
}

function toggleReveal() {
  showTranslation = !showTranslation;
  const el  = document.getElementById('ptTranslation');
  const btn = document.getElementById('revealBtn');
  if(el)  el.classList.toggle('show', showTranslation);
  if(btn) btn.textContent = showTranslation ? '🙈 Ocultar tradução' : '👁️ Mostrar tradução';
}

function rate(level, btn) {
  const p = filteredPhrases[currentIndex];
  if(level === 'easy') {
    masteredSet.add(p.id); saveMastered(); updateChip();
    showToast('⭐ Frase dominada!');
  } else if(level === 'hard') {
    masteredSet.delete(p.id); saveMastered();
    showToast('💪 Continue praticando!');
  }
  btn.classList.add('selected');
  setTimeout(()=>navigate(1), 650);
}

function checkQuiz(btn, selectedId, correctId) {
  if(quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    const bid = b.getAttribute('onclick').match(/'(\d+)'/)?.[1];
    if(bid === correctId) b.classList.add('correct');
  });
  if(selectedId === correctId) {
    btn.classList.add('correct');
    showToast('✅ Correto!');
    masteredSet.add(parseInt(correctId)); saveMastered(); updateChip();
  } else {
    btn.classList.add('wrong');
    showToast('❌ A resposta está destacada.');
  }
  setTimeout(()=>navigate(1), 1300);
}

function speak(text) {
  if(!('speechSynthesis' in window)) { showToast('Voz não disponível.'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function setMode(mode) {
  currentMode     = mode;
  showTranslation = false;
  quizAnswered    = false;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode'+mode.charAt(0).toUpperCase()+mode.slice(1)).classList.add('active');
  renderCard();
}

function updateChip() {
  document.getElementById('masteredChip').textContent = `⭐ ${masteredSet.size}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2000);
}

function onKey(e) {
  if(e.target.tagName === 'INPUT') return;
  if(document.getElementById('modalOverlay').classList.contains('open')) {
    if(e.key==='Escape') closeModalDirect();
    return;
  }
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='ArrowLeft')  navigate(-1);
  if(e.key===' ')          { e.preventDefault(); toggleReveal(); }
}

init();

</script>
</body>
</html>
